<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Parser">
  <meta name="theme-color" content="#c8b89a">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="/gmail-parser/icon.png">
  <title>Волк ловит письма</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }

    html, body {
      height: 100%; width: 100%;
      background: #d4c5a9;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
    }

    /* ===== КОРПУС ===== */
    .console {
      width: 100vw; height: 100vh;
      max-width: 480px;
      background: linear-gradient(160deg, #e8dcc8 0%, #d4c5a9 40%, #c8b89a 100%);
      border-radius: 24px;
      box-shadow:
        inset 0 2px 4px rgba(255,255,255,.6),
        inset 0 -2px 4px rgba(0,0,0,.2),
        0 8px 32px rgba(0,0,0,.4);
      display: flex; flex-direction: column;
      align-items: center;
      padding: 12px 8px 10px;
      position: relative;
    }

    .title-top {
      font-size: 9px; letter-spacing: 3px;
      color: #5a4a3a; text-transform: uppercase;
      margin-bottom: 6px; text-align: center;
    }

    /* ===== ЭКРАН ===== */
    .screen-bezel {
      width: 100%; flex: 1;
      background: #2a2a2a;
      border-radius: 12px; padding: 4px;
      box-shadow: inset 0 2px 8px rgba(0,0,0,.8), 0 2px 4px rgba(255,255,255,.3);
      position: relative;
    }

    .screen {
      width: 100%; height: 100%;
      background: #8fa888;
      border-radius: 8px;
      position: relative; overflow: hidden;
    }

    /* LCD-сетка */
    .screen::before {
      content: '';
      position: absolute; inset: 0; z-index: 10;
      background-image:
        repeating-linear-gradient(0deg, rgba(0,0,0,.03) 0px, rgba(0,0,0,.03) 1px, transparent 1px, transparent 3px),
        repeating-linear-gradient(90deg, rgba(0,0,0,.03) 0px, rgba(0,0,0,.03) 1px, transparent 1px, transparent 3px);
      pointer-events: none;
    }

    /* Блик */
    .screen::after {
      content: '';
      position: absolute; inset: 0; z-index: 11;
      background: linear-gradient(135deg, rgba(255,255,255,.12) 0%, transparent 50%);
      pointer-events: none; border-radius: 8px;
    }

    canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }

    .title-bottom {
      font-size: 8px; letter-spacing: 2px;
      color: #5a4a3a; text-transform: uppercase;
      margin-top: 6px; text-align: center;
    }

    /* ===== КНОПКИ ===== */
    .controls {
      width: 100%;
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 4px 4px; gap: 8px;
    }

    .btn-group { display: flex; flex-direction: column; gap: 6px; align-items: center; }
    .btn-label { font-size: 7px; color: #5a4a3a; text-align: center; letter-spacing: 1px; }

    .btn-red {
      width: 52px; height: 52px;
      background: radial-gradient(circle at 35% 35%, #ff6b6b, #cc2200);
      border-radius: 50%; border: none; cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,.4), inset 0 1px 2px rgba(255,255,255,.3);
      transition: transform .1s, box-shadow .1s;
    }
    .btn-red:active {
      transform: scale(.93) translateY(2px);
      box-shadow: 0 2px 4px rgba(0,0,0,.4);
    }

    .btn-start { display: flex; flex-direction: column; align-items: center; gap: 4px; }

    .btn-oval {
      width: 70px; height: 28px;
      background: linear-gradient(180deg, #c8b89a, #a89880);
      border-radius: 14px; border: none; cursor: pointer;
      box-shadow: 0 3px 6px rgba(0,0,0,.3), inset 0 1px 2px rgba(255,255,255,.4);
      font-family: 'Press Start 2P', monospace;
      font-size: 6px; color: #5a4a3a; letter-spacing: 1px;
      transition: transform .1s;
    }
    .btn-oval:active { transform: scale(.95) translateY(1px); }
    .btn-oval.active-btn {
      background: linear-gradient(180deg, #ff9966, #cc5500);
      color: #fff;
      box-shadow: 0 0 12px rgba(255,100,0,.6), 0 3px 6px rgba(0,0,0,.3);
    }

    /* ===== ОВЕРЛЕИ ===== */
    #overlay, #doneOverlay {
      position: absolute; inset: 0; z-index: 20;
      background: rgba(143,168,136,.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; border-radius: 8px;
    }
    #doneOverlay { display: none; }

    .wolf-big { font-size: 48px; animation: bounce 1s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }

    .ov-title { font-size: 9px; color: #2a3a2a; text-align: center; line-height: 1.8; letter-spacing: 1px; }
    .ov-sub   { font-size: 7px; color: #4a5a4a; animation: blink 1s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    .done-icon  { font-size: 40px; }
    .done-title { font-size: 9px; color: #2a3a2a; text-align: center; line-height: 1.8; }
    .done-score { font-size: 14px; color: #1a4a1a; }
    .done-time  { font-size: 7px; color: #4a5a4a; }
  </style>
</head>
<body>
<div class="console">
  <div class="title-top">Волк ловит письма</div>

  <div class="screen-bezel">
    <div class="screen">
      <canvas id="gameCanvas"></canvas>

      <div id="overlay">
        <div class="wolf-big">🐺</div>
        <div class="ov-title">GMAIL<br>PARSER</div>
        <div class="ov-sub">нажми СТАРТ</div>
      </div>

      <div id="doneOverlay">
        <div class="done-icon">🎉</div>
        <div class="done-title">ГОТОВО!</div>
        <div class="done-score" id="doneScore">0000</div>
        <div class="done-time"  id="doneTime"></div>
      </div>
    </div>
  </div>

  <div class="title-bottom">Электроника</div>

  <div class="controls">
    <div class="btn-group">
      <button class="btn-red" id="btnReset"></button>
      <div class="btn-label">СБРОС</div>
    </div>
    <div class="btn-start">
      <button class="btn-oval" id="btnStart">СТАРТ</button>
      <div class="btn-label" id="statusLabel">готов</div>
    </div>
    <div class="btn-group">
      <button class="btn-red" id="btnInfo"></button>
      <div class="btn-label">ИНФО</div>
    </div>
  </div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycby2HXW5PInaz9KSUGdTbHhGqIWQESRCJkXX2aCwUnz3xiKirJJC-O7NjXAvc351w3lx/exec";

// ===== CANVAS =====
const canvas = document.getElementById('gameCanvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = canvas.parentElement.clientWidth;
  canvas.height = canvas.parentElement.clientHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const W = () => canvas.width;
const H = () => canvas.height;

// ===== STATE =====
let score=0, running=false, startTime=null, animId=null;
let eggs=[], particles=[], wolfX=0.5, wolfDir=1, wolfAnim=0;
let eggTimer=0, progress=0;

const LANES = [
  {side:'left',  yFrac:0.30},
  {side:'left',  yFrac:0.46},
  {side:'right', yFrac:0.30},
  {side:'right', yFrac:0.46},
];

// ===== DRAW =====
function drawBg() {
  ctx.fillStyle = '#8fa888';
  ctx.fillRect(0,0,W(),H());
}

function drawHenhouses() {
  ctx.save();
  ctx.strokeStyle = '#5a3a1a';
  ctx.lineWidth = Math.max(2, W()*0.006);
  // Левые полки
  for (let i=0;i<3;i++) {
    const y = H()*(0.28+i*0.17);
    ctx.beginPath();
    ctx.moveTo(W()*0.03, y);
    ctx.lineTo(W()*0.28, y + H()*0.1);
    ctx.stroke();
  }
  // Правые полки
  for (let i=0;i<3;i++) {
    const y = H()*(0.28+i*0.17);
    ctx.beginPath();
    ctx.moveTo(W()*0.97, y);
    ctx.lineTo(W()*0.72, y + H()*0.1);
    ctx.stroke();
  }
  // Трава
  ctx.fillStyle = '#3a6a3a';
  for (let i=0;i<22;i++) {
    const gx = W()*0.03 + i*W()*0.044;
    const gy = H()*0.87;
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.lineTo(gx+3, gy-7);
    ctx.lineTo(gx+6, gy);
    ctx.fill();
  }
  ctx.restore();
}

function drawHens() {
  const sz = H()*0.065;
  ctx.font = `${sz}px serif`;
  ctx.textAlign = 'center';
  // Левые куры
  ctx.fillText('🐔', W()*0.07, H()*0.30);
  ctx.fillText('🐔', W()*0.07, H()*0.47);
  // Правые куры (зеркально через scale)
  ctx.save();
  ctx.translate(W()*0.93, H()*0.30);
  ctx.scale(-1,1);
  ctx.fillText('🐔', 0, 0);
  ctx.restore();
  ctx.save();
  ctx.translate(W()*0.93, H()*0.47);
  ctx.scale(-1,1);
  ctx.fillText('🐔', 0, 0);
  ctx.restore();
}

function drawWolf() {
  const x = wolfX * W();
  const y = H() * 0.79;
  const bounce = Math.sin(wolfAnim*0.25)*3;
  ctx.save();
  ctx.translate(x, y+bounce);
  if (wolfDir < 0) ctx.scale(-1,1);
  ctx.font = `${H()*0.14}px serif`;
  ctx.textAlign = 'center';
  ctx.fillText('🐺', 0, 0);
  // Корзина
  ctx.font = `${H()*0.07}px serif`;
  ctx.fillText('🧺', 22, H()*0.04);
  ctx.restore();
}

function drawEggs() {
  eggs.forEach(egg => {
    ctx.save();
    ctx.translate(egg.x, egg.y);
    ctx.font = `${H()*0.055}px serif`;
    ctx.textAlign = 'center';
    ctx.fillText('🥚', 0, 0);
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.life;
    ctx.font = `${Math.round(16*p.life)}px serif`;
    ctx.textAlign = 'center';
    ctx.fillText('✨', p.x, p.y);
    ctx.restore();
  });
}

function drawScore() {
  const s = String(score).padStart(4,'0');
  ctx.save();
  ctx.font = `bold ${H()*0.09}px 'Courier New', monospace`;
  ctx.fillStyle = '#1a3a1a';
  ctx.textAlign = 'center';
  ctx.fillText(s, W()*0.65, H()*0.14);
  ctx.restore();
}


function drawProgressBar() {
  const pw = W()*0.7, px = W()*0.15, py = H()*0.93;
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,.15)';
  ctx.fillRect(px, py, pw, 5);
  ctx.fillStyle = '#2a5a2a';
  ctx.fillRect(px, py, pw*(progress/100), 5);
  ctx.restore();
}


function render() {
  ctx.clearRect(0,0,W(),H());
  drawBg();
  drawHenhouses();
  drawHens();
  drawEggs();
  drawWolf();
  drawParticles();
  drawScore();
  drawProgressBar();
}

// ===== LOGIC =====
function spawnEgg() {
  const lane = LANES[Math.floor(Math.random()*LANES.length)];
  const sx = lane.side==='left' ? W()*0.07 : W()*0.93;
  const sy = H()*lane.yFrac;
  eggs.push({
    x:sx, y:sy, startX:sx, startY:sy,
    endX:W()*0.5, endY:H()*0.79,
    t:0, speed:0.004+Math.random()*0.003
  });
}

function updateEggs() {
  eggs = eggs.filter(egg => {
    egg.t += egg.speed * (1 + progress/150);
    const t = egg.t;
    egg.x = egg.startX + (egg.endX-egg.startX)*t;
    egg.y = egg.startY + (egg.endY-egg.startY)*t - Math.sin(t*Math.PI)*H()*0.18;

    // Поймал?
       if (t > 0.65 && Math.hypot(egg.x-wolfX*W(), egg.y-H()*0.79) < W()*0.13) {
      // score не трогаем — он синхронизируется с GAS
      particles.push({x:egg.x, y:egg.y, life:1});
      return false;
    }
    return egg.t < 1;
  });
}

function updateParticles() {
  particles = particles.filter(p => { p.y-=1.5; p.life-=0.04; return p.life>0; });
}

function updateWolf() {
  wolfAnim++;
  // Ищем ближайшее яйцо в нижней части траектории
  let nearest=null, minD=Infinity;
  eggs.forEach(egg => {
    if (egg.t > 0.45) {
      const d = Math.abs(egg.x - wolfX*W());
      if (d < minD) { minD=d; nearest=egg; }
    }
  });
  if (nearest) {
    const tx = nearest.x/W();
    const diff = tx - wolfX;
    wolfDir = diff>0 ? 1 : -1;
    wolfX += diff*0.07;
  } else {
    wolfX += wolfDir*0.002;
    if (wolfX>0.75) wolfDir=-1;
    if (wolfX<0.25) wolfDir=1;
  }
  wolfX = Math.max(0.08, Math.min(0.92, wolfX));
}

function gameLoop() {
  if (!running) return;
  eggTimer++;
  const rate = Math.max(15, 50-Math.floor(progress/4));
  if (eggTimer >= rate) { spawnEgg(); eggTimer=0; }
  updateEggs();
  updateParticles();
  updateWolf();
  render();
  animId = requestAnimationFrame(gameLoop);
}

// ===== API =====
function startParsing() {
  if (running) return;
  running=true; score=0; progress=0;
  eggs=[]; particles=[]; wolfX=0.5; startTime=Date.now();

  document.getElementById('overlay').style.display     = 'none';
  document.getElementById('doneOverlay').style.display = 'none';
  document.getElementById('btnStart').classList.add('active-btn');
  document.getElementById('btnStart').textContent = '...';
  setStatus('парсинг');
  gameLoop();

  // Шаг 1: отправляем старт (fire-and-forget, не ждём завершения)
  fetch(GAS_URL+"?action=start").catch(()=>{});

  // Шаг 2: polling — ждём пока status станет done/error
  const poll = setInterval(() => {
    if (!running) { clearInterval(poll); return; }

    fetch(GAS_URL+"?action=status")
      .then(r => r.json())
      .then(d => {
        const p = parseInt(d.progress) || 0;
        if (p > progress) progress = p;

        score = parseInt(d.codesFound) || 0;

        if (d.status === 'done') {
          clearInterval(poll);
          progress = 100;
          score = parseInt(d.codesFound) || score;
          finishGame();
        } else if (d.status === 'error') {
          clearInterval(poll);
          setStatus('ошибка');
          finishGame();
        }
      })
      .catch(() => {});
  }, 3000);

  // Страховка: если через 10 минут нет ответа — завершаем
  setTimeout(() => {
    if (running) {
      clearInterval(poll);
      finishGame();
    }
  }, 10 * 60 * 1000);
}


function finishGame() {
  running=false;
  cancelAnimationFrame(animId);
  render();
  const el = Math.round((Date.now()-startTime)/1000);
  const m=Math.floor(el/60), s=el%60;
  document.getElementById('doneScore').textContent = String(score).padStart(4,'0');
  document.getElementById('doneTime').textContent  = `время: ${m}:${String(s).padStart(2,'0')}`;
  document.getElementById('doneOverlay').style.display = 'flex';
  document.getElementById('btnStart').classList.remove('active-btn');
  document.getElementById('btnStart').textContent = 'СТАРТ';
  setStatus('готово');
}

function resetGame() {
  running=false; cancelAnimationFrame(animId);
  score=0; progress=0; eggs=[]; particles=[]; wolfX=0.5;
  document.getElementById('overlay').style.display     = 'flex';
  document.getElementById('doneOverlay').style.display = 'none';
  document.getElementById('btnStart').classList.remove('active-btn');
  document.getElementById('btnStart').textContent = 'СТАРТ';
  setStatus('готов');
  render();
  fetch(GAS_URL+"?action=reset").catch(()=>{});
}

function setStatus(t) { document.getElementById('statusLabel').textContent=t; }

// ===== BUTTONS =====
document.getElementById('btnStart').addEventListener('click', startParsing);
document.getElementById('btnReset').addEventListener('click', resetGame);
document.getElementById('btnInfo').addEventListener('click', () => {
  fetch(GAS_URL+"?action=status")
    .then(r=>r.json())
    .then(d=>setStatus(d.status+' '+d.progress+'%'))
    .catch(()=>setStatus('нет связи'));
});

// ===== INIT =====
window.addEventListener('load', () => {
  resizeCanvas(); render();
  fetch(GAS_URL+"?action=status")
    .then(r=>r.json())
    .then(d=>{ if(d.status==='done') setStatus('последний: ок'); })
    .catch(()=>{});
});
</script>
</body>
</html>
